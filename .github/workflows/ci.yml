name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela execuções antigas do mesmo ref quando um novo push chega
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      # Build é o gate obrigatório: precisa passar para o PR ser mergeável.
      - name: Build
        run: npm run build
