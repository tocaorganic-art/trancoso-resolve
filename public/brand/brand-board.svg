    <path d="M38 22 L20 38.5 L20 63 Q20 64 21 64 L55 64 Q56 64 56 63 L56 38.5 Z" fill="#FFFFFF"/>
    <path d="M32.7 64 L32.7 52.7 Q32.7 46.7 38 46.7 Q43.3 46.7 43.3 52.7 L43.3 64 Z" fill="#C1440E"/>
