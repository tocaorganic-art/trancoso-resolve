<svg width="900" height="1180" viewBox="0 0 900 1180" xmlns="http://www.w3.org/2000/svg" font-family="Nunito, ui-rounded, system-ui, sans-serif">
  <rect width="900" height="1180" fill="#F8ECDC"/>
  <rect x="40" y="40" width="820" height="1100" rx="36" fill="#FBF7F1" stroke="#E7DBCB" stroke-width="1.5"/>

