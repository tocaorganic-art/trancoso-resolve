<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1208"/>
      <stop offset="60%" stop-color="#2C1A0A"/>
      <stop offset="100%" stop-color="#3D2310"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8571A"/>
      <stop offset="100%" stop-color="#C1440E"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F2DEC4"/>
      <stop offset="100%" stop-color="#E8C9A0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Warm texture dots -->
  <circle cx="900" cy="100" r="280" fill="#E8571A" opacity="0.07"/>
  <circle cx="1100" cy="520" r="200" fill="#C1440E" opacity="0.06"/>
  <circle cx="80" cy="500" r="150" fill="#6B7C3A" opacity="0.06"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Orange pill badge -->
  <rect x="80" y="80" width="200" height="38" rx="19" fill="#E8571A" opacity="0.15"/>
  <rect x="80" y="80" width="200" height="38" rx="19" fill="none" stroke="#E8571A" stroke-width="1.5" opacity="0.5"/>
  <text x="180" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#F2A070" text-anchor="middle" letter-spacing="1.5">TRANCOSO · BAHIA</text>

  <!-- Logo mark — stylized "R" squircle -->
  <rect x="80" y="148" width="72" height="72" rx="18" fill="#E8571A"/>
  <text x="116" y="201" font-family="Georgia, serif" font-size="46" font-weight="900" fill="white" text-anchor="middle">R</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="system-ui, -apple-system, Helvetica Neue, sans-serif" font-size="80" font-weight="900" fill="url(#textGrad)" letter-spacing="-2">Trancoso</text>
  <text x="80" y="402" font-family="system-ui, -apple-system, Helvetica Neue, sans-serif" font-size="80" font-weight="900" fill="#E8571A" letter-spacing="-1">RESOLVE</text>

  <!-- Sub-headline -->
  <text x="80" y="458" font-family="system-ui, -apple-system, Helvetica Neue, sans-serif" font-size="26" font-weight="400" fill="#C4A882" letter-spacing="0.3">Serviços locais verificados em Trancoso, Bahia</text>

  <!-- Divider -->
  <rect x="80" y="488" width="120" height="3" rx="2" fill="#E8571A" opacity="0.7"/>

  <!-- Bottom tagline -->
  <text x="80" y="540" font-family="system-ui, -apple-system, Helvetica Neue, sans-serif" font-size="22" font-weight="600" fill="#8A7060" letter-spacing="0.2">Encontre quem resolve, pertinho de você.</text>

  <!-- Right side decorative icon cluster -->
  <!-- House icon -->
  <g transform="translate(830, 160)" opacity="0.18">
    <rect x="0" y="40" width="100" height="70" rx="6" fill="#F2DEC4"/>
    <polygon points="50,0 0,45 100,45" fill="#E8571A"/>
    <rect x="35" y="65" width="30" height="45" rx="3" fill="#C1440E"/>
  </g>
  <!-- Wrench icon -->
  <g transform="translate(990, 200)" opacity="0.15">
    <rect x="10" y="0" width="20" height="80" rx="10" fill="#F2DEC4" transform="rotate(30, 20, 40)"/>
    <circle cx="20" cy="15" r="18" fill="none" stroke="#F2DEC4" stroke-width="8"/>
  </g>
  <!-- Star icon -->
  <g transform="translate(870, 360)" opacity="0.16">
    <polygon points="60,0 74,42 120,42 82,68 96,110 60,84 24,110 38,68 0,42 46,42" fill="#E8571A"/>
  </g>
  <!-- Circle rings -->
  <circle cx="1050" cy="420" r="90" fill="none" stroke="#E8571A" stroke-width="2" opacity="0.12"/>
  <circle cx="1050" cy="420" r="60" fill="none" stroke="#C1440E" stroke-width="1.5" opacity="0.1"/>
  <circle cx="1050" cy="420" r="30" fill="#E8571A" opacity="0.1"/>

  <!-- URL watermark -->
  <text x="1120" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="#5A4A3A" text-anchor="end" opacity="0.7">trancosoresolve.com.br</text>
</svg>
